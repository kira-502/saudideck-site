<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi Deck Membership</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>

<body>

    <!-- Header Section -->
    <header>
        <div class="header-content">
            <a href="https://saudideck.com" target="_blank" style="display:block;">
                <img src="assets/logo.png" alt="SaudiDeck" class="logo">
            </a>
            <p class="subtitle">بوابة العضوية الرسمية</p>
        </div>
        <div class="nav-group">
            <div class="help-dropdown">
                <button class="nav-btn btn-how">
                    طريقة الاستخدام
                </button>
                <div class="dropdown-content">
                    <a href="instructions.html">
                        <img src="assets/Windows_logo.png" alt="PC"> PC
                    </a>
                    <a href="help-deck.html">
                        <img src="assets/Steam_Deck_logo.png" alt="Steam Deck"> Steam Deck
                    </a>
                </div>
            </div>
            <a href="javascript:void(0)" onclick="openRequestModal()" class="nav-btn btn-request">طلب لعبة</a>
            <a href="https://saudideck.com/en/600-games-on-one-account-saudideck-membership/p444700950?from=search-bar"
                target="_blank" class="nav-btn btn-buy">
                شراء العضوية
            </a>
        </div>
    </header>
    <div class="geometric-divider"></div>

    <!-- Controls & Filters -->
    <div class="controls">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="...ابحث عن لعبة" onkeyup="debouncedSearch()">
        </div>

        <button class="mobile-filter-btn" onclick="toggleFilters()">⚙️ تصفية وترتيب النتائج</button>

        <div class="filters-panel" id="filtersPanel">
            <select id="genreFilter" onchange="resetAndRender()">
                <option value="All">All Genres</option>
            </select>

            <select id="yearFilter" onchange="resetAndRender()">
                <option value="All">كل السنوات</option>
            </select>

            <select id="sortFilter" onchange="resetAndRender()">
                <option value="metacritic" selected>ترتيب: الافتراضي</option>
                <option value="date_added">ترتيب: المضافة حديثاً</option>
                <option value="newest">ترتيب: الأحدث</option>
                <option value="oldest">ترتيب: الأقدم</option>
                <option value="az">ترتيب: أبجدي (أ-ي)</option>
                <option value="score_high">ترتيب: الأعلى تقييماً</option>
                <option value="score_low">ترتيب: الأدنى تقييماً</option>
            </select>
            <button class="new-badge-btn" id="newlyAddedBtn" onclick="toggleNewlyAdded()">🆕 <span>المضافة حديثاً</span></button>
            <label class="deck-toggle" id="verifiedToggleBtn" title="عرض ألعاب Steam Deck الموثقة فقط">
                <input type="checkbox" id="verifiedFilter" onchange="toggleVerifiedFilter()">
                <div class="toggle-icons">
                    <img src="assets/Steam_Deck_logo.png" alt="Steam Deck">
                    <img src="assets/badge_verified.png" alt="Verified">
                </div>
                <span>متوافق مع Steam Deck</span>
            </label>
        </div>
    </div>

    <!-- Game Grid -->
    <div class="container" id="gameGrid"></div>

    <!-- Pagination -->
    <div class="load-more-container" id="loadMoreArea">
        <button class="btn-load" onclick="loadMore()">عرض المزيد</button>
    </div>

    <!-- Scroll Top -->
    <div class="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</div>

    <!-- Footer -->
    <div class="geometric-divider"></div>
    <footer>
        &copy; 2025 SaudiDeck. مجموعة مختارة بعناية.
        <br>
        <a href="javascript:void(0)" onclick="openRequestModal()" class="footer-request-btn"
            style="text-decoration:none; display:inline-block;">طلب إضافة لعبة</a>
    </footer>

    <!-- Request Game Modal -->
    <div class="request-overlay" id="requestOverlay" onclick="if(event.target === this) closeRequestModal()">
        <div class="request-card">
            <div class="request-close" onclick="closeRequestModal()">✕</div>
            <h2 class="request-title">طلب لعبة جديدة</h2>
            <form id="requestForm" onsubmit="handleRequestSubmit(event)">
                <div class="form-group">
                    <label for="gameName">اسم اللعبة</label>
                    <input type="text" id="gameName" name="game" class="form-input" placeholder="اكتب اسم اللعبة..."
                        required>
                </div>

                <div class="form-group">
                    <label for="orderNumber">رقم الطلب (اختياري)</label>
                    <input type="number" id="orderNumber" name="order_number" class="form-input"
                        placeholder="10XXX... (للعملاء فقط)">
                    <small class="form-hint">سيتم إبلاغك فور توفرها إذا كنت مشتركاً.</small>
                </div>

                <button type="submit" class="request-submit" id="requestSubmitBtn">
                    إرسال الطلب 🚀
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="games.js?v=46" type="text/javascript"></script>
    <script src="script.js?v=6"></script>
</body>

</html>
